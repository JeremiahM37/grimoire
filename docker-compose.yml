# Grimoire Notes — one-command self-host.
#   docker compose up -d   →   http://localhost:9111
services:
  grimoire:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: grimoire-notes:latest
    container_name: grimoire-notes
    ports:
      - "9111:9111"
    volumes:
      - ./vault:/vault            # your notes live here — plain .md files you own
    environment:
      # optional: point at a local Ollama to make "ask your notes" generative
      # GRIMOIRE_OLLAMA_URL: http://ollama:11434
      GRIMOIRE_VAULT: /vault
    restart: unless-stopped
