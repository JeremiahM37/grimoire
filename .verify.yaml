# Verify grimoire is actually in a working state. Run: verify run .verify.yaml
# (Run `.venv/bin/pytest` separately for the unit/api/e2e suite — running it here
# would launch a second Chromium inside verify's own browser session and crash.)
backend: web

launch:
  # port 9119, NOT 9111 — the production service runs on 9111; using it here
  # would fail to bind, silently test against production, and pollute the live vault.
  command: .venv/bin/python -m server
  url: http://127.0.0.1:9119
  env:
    GRIMOIRE_VAULT: /tmp/grimoire-verify-vault
    GRIMOIRE_PORT: "9119"
  ready_when: { url: http://127.0.0.1:9119/api/health }
  wait_after: 1

options:
  web:
    headless: true
    viewport: [414, 896]

steps:
  - name: api healthy
    actions:
      - shell: curl -sf http://127.0.0.1:9119/api/health | grep -q '"ok":true'

  - name: create + read a note round-trips
    actions:
      - shell: >
          curl -sf -X POST http://127.0.0.1:9119/api/notes
          -H 'Content-Type: application/json'
          -d '{"title":"Verify Note","body":"# Verify Note\n\nlinks to [[Other]] #verify"}'
      - shell: curl -sf http://127.0.0.1:9119/api/notes/verify-note.md | grep -q '"title":"Verify Note"'
      - shell: curl -sf 'http://127.0.0.1:9119/api/search?q=links' | grep -q verify-note

  - name: notes app renders in a browser
    actions:
      - navigate: http://127.0.0.1:9119/
      - wait: 2
    expect:
      vision: >
        a note-taking application titled "grimoire" with a left sidebar and an editor
        area; warm paper-colored background; it is a working app UI, not a blank
        white page, not an error message, not a stack trace
